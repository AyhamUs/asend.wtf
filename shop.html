<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Asend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #030303;
            --surface: #0b0b0b;
            --text: #f3f3f3;
            --muted: #979797;
            --line: #1f1f1f;
            --line-strong: #2f2f2f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(1100px circle at 14% -12%, #171717 0%, rgba(23, 23, 23, 0) 44%),
                radial-gradient(900px circle at 110% 120%, #101010 0%, rgba(16, 16, 16, 0) 45%),
                var(--bg);
            padding: 2rem 1rem;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
            color-scheme: dark;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: -1;
            opacity: 0.45;
        }

        body::before {
            background: #1a1a1a;
            top: -110px;
            left: -120px;
        }

        body::after {
            background: #111111;
            right: -120px;
            bottom: -130px;
        }

        .header {
            margin-bottom: 4rem;
        }

        .header-row {
            width: min(980px, 100%);
            margin: 0 auto 0.9rem;
            min-height: 92px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(16, 16, 16, 0.9), rgba(8, 8, 8, 0.88));
            border: 1px solid var(--line);
            border-radius: 18px;
            backdrop-filter: blur(6px);
        }

        .cart-icon {
            position: absolute;
            right: 1.25rem;
            font-size: 1.5rem;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .cart-icon:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--text);
            color: #0d131d;
            font-size: 0.625rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .logo {
            margin-bottom: 0;
            overflow: hidden;
            display: inline-block;
        }

        .logo img {
            max-width: min(420px, 72vw);
            height: auto;
            display: block;
            margin-bottom: -10px;
        }

        .back-link {
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.2em;
            transition: color 0.2s;
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .back-link:hover {
            color: var(--text);
        }

        .back-link i {
            margin-right: 0.5rem;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 clamp(0.6rem, 2vw, 2rem);
        }

        .section-kicker {
            text-align: center;
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            color: var(--muted);
            margin: 0 0 0.5rem;
            font-weight: 500;
        }

        .catalog-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            margin: 0 0 1.6rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: clamp(1rem, 1.8vw, 1.6rem);
            align-items: start;
        }

        .product-card {
            border: 1px solid var(--line);
            background: var(--surface);
            padding: clamp(1rem, 1.6vw, 1.4rem);
            width: 100%;
            max-width: none;
            border-radius: 18px;
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: riseIn 0.6s ease both;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 42px rgba(0, 0, 0, 0.72);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: #111111;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #4a4a4a;
            border-radius: 12px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .view-product {
            width: 100%;
            margin-bottom: 1.2rem;
            padding: 0.72rem 1rem;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            background: #121212;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-product:hover {
            border-color: var(--text);
            transform: translateY(-1px);
        }

        .product-modal {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .product-modal.open {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(8, 10, 14, 0.55);
            backdrop-filter: blur(3px);
        }

        .modal-panel {
            position: relative;
            width: min(100%, 760px);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
            padding: 1.2rem;
            z-index: 1;
        }

        .modal-close {
            position: absolute;
            right: 0.8rem;
            top: 0.8rem;
            width: 34px;
            height: 34px;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            background: #121212;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
        }

        .modal-close:hover {
            border-color: var(--text);
        }

        .modal-title {
            font-size: 0.82rem;
            letter-spacing: 0.24em;
            color: var(--muted);
            margin: 0 0 1rem;
            text-align: center;
        }

        .modal-toggle {
            display: flex;
            justify-content: center;
            gap: 0.55rem;
            margin-bottom: 1rem;
        }

        .modal-view-btn {
            border: 1px solid var(--line-strong);
            background: #121212;
            color: var(--text);
            font-size: 0.64rem;
            letter-spacing: 0.2em;
            padding: 0.5rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .modal-view-btn:hover {
            border-color: var(--text);
            transform: translateY(-1px);
        }

        .modal-view-btn.active {
            background: var(--text);
            color: #090909;
            border-color: var(--text);
        }

        .modal-image-wrap {
            border-radius: 12px;
            overflow: hidden;
            background: #111111;
            aspect-ratio: 1;
        }

        .modal-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-name {
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.14em;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 1.2rem;
            letter-spacing: 0.1em;
        }

        .size-selector {
            margin-bottom: 1.5rem;
        }

        .size-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 0.75rem;
            display: block;
        }

        .size-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .size-option {
            padding: 0.5rem 1rem;
            border: 1px solid var(--line-strong);
            background: #121212;
            color: var(--text);
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            transition: all 0.2s;
            border-radius: 999px;
            appearance: none;
            -webkit-appearance: none;
        }

        .size-option:hover {
            border-color: var(--text);
        }

        .size-option.selected {
            background: var(--text);
            color: #090909;
            border-color: var(--text);
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8125rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            border: 1px solid var(--text);
            background: var(--text);
            color: #090909;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 999px;
        }

        .product-card:nth-child(1) { animation-delay: 0.08s; }
        .product-card:nth-child(2) { animation-delay: 0.18s; }
        .product-card:nth-child(3) { animation-delay: 0.28s; }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .product-card {
                animation: none;
            }
        }

        .add-to-cart:hover {
            opacity: 0.92;
        }

        .add-to-cart:active {
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            margin-top: 4rem;
            font-size: 0.6875rem;
            color: var(--muted);
            letter-spacing: 0.25em;
            font-weight: 400;
        }

        @media (max-width: 1100px) {
            .container {
                max-width: 980px;
            }

            .product-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .cart-icon {
                right: 0.9rem;
                font-size: 1.25rem;
            }

            .header-row {
                min-height: 84px;
            }

            .container {
                padding: 0 1rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-card {
                padding: 1.5rem;
            }

            .modal-panel {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <a href="cart.html" class="cart-icon" aria-label="Open cart">
                <i class="fa-solid fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <h1 class="logo">
                <img src="assets/logo.png" alt="Asend Logo">
            </h1>
        </div>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i>HOME</a>
    </div>

    <div class="container">
        <p class="section-kicker">SHOP</p>
        <p class="catalog-note">3 SHIRTS AVAILABLE</p>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="assets/shirt1front.jpeg" alt="ASEND SHIRT NO. 1 FRONT">
                </div>
                <button class="view-product" data-name="ASEND SHIRT NO. 1" data-front="assets/shirt1front.jpeg" data-back="assets/shirt1back.jpeg">VIEW FRONT / BACK</button>
                <div class="product-name">ASEND SHIRT NO. 1</div>
                <div class="product-price">$25</div>
                <div class="size-selector">
                    <label class="size-label">SELECT SIZE</label>
                    <div class="size-options">
                        <button class="size-option" data-size="S">S</button>
                        <button class="size-option" data-size="M">M</button>
                        <button class="size-option" data-size="L">L</button>
                        <button class="size-option" data-size="XL">XL</button>
                    </div>
                </div>
                <button class="add-to-cart" data-product="ASEND SHIRT NO. 1" data-price="25">ADD TO CART</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="assets/shirt2front.jpeg" alt="ASEND SHIRT NO. 2 FRONT">
                </div>
                <button class="view-product" data-name="ASEND SHIRT NO. 2" data-front="assets/shirt2front.jpeg" data-back="assets/shirt2back.jpeg">VIEW FRONT / BACK</button>
                <div class="product-name">ASEND SHIRT NO. 2</div>
                <div class="product-price">$25</div>
                <div class="size-selector">
                    <label class="size-label">SELECT SIZE</label>
                    <div class="size-options">
                        <button class="size-option" data-size="S">S</button>
                        <button class="size-option" data-size="M">M</button>
                        <button class="size-option" data-size="L">L</button>
                        <button class="size-option" data-size="XL">XL</button>
                    </div>
                </div>
                <button class="add-to-cart" data-product="ASEND SHIRT NO. 2" data-price="25">ADD TO CART</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="assets/shirt3front.jpeg" alt="ASEND SHIRT NO. 3 FRONT">
                </div>
                <button class="view-product" data-name="ASEND SHIRT NO. 3" data-front="assets/shirt3front.jpeg" data-back="assets/shirt3back.jpeg">VIEW FRONT / BACK</button>
                <div class="product-name">ASEND SHIRT NO. 3</div>
                <div class="product-price">$25</div>
                <div class="size-selector">
                    <label class="size-label">SELECT SIZE</label>
                    <div class="size-options">
                        <button class="size-option" data-size="S">S</button>
                        <button class="size-option" data-size="M">M</button>
                        <button class="size-option" data-size="L">L</button>
                        <button class="size-option" data-size="XL">XL</button>
                    </div>
                </div>
                <button class="add-to-cart" data-product="ASEND SHIRT NO. 3" data-price="25">ADD TO CART</button>
            </div>
        </div>
    </div>

    <div class="product-modal" id="productModal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" type="button" data-close-modal aria-label="Close">×</button>
            <p class="modal-title" id="modalTitle"></p>
            <div class="modal-toggle">
                <button class="modal-view-btn active" type="button" data-view="front">FRONT</button>
                <button class="modal-view-btn" type="button" data-view="back">BACK</button>
            </div>
            <div class="modal-image-wrap">
                <img id="modalImage" src="" alt="">
            </div>
        </div>
    </div>

    <footer>
        ASEND © 2026
    </footer>

    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('asendCart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('asendCart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        const productModal = document.getElementById('productModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalImage = document.getElementById('modalImage');
        const modalViewButtons = document.querySelectorAll('.modal-view-btn');
        let currentFrontImage = '';
        let currentBackImage = '';

        function setModalView(view) {
            const isFront = view === 'front';
            modalImage.src = isFront ? currentFrontImage : currentBackImage;
            modalImage.alt = `${modalTitle.textContent} ${isFront ? 'FRONT' : 'BACK'}`;
            modalViewButtons.forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
        }

        function openProductModal(name, front, back) {
            modalTitle.textContent = name;
            currentFrontImage = front;
            currentBackImage = back;
            setModalView('front');
            productModal.classList.add('open');
            productModal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeProductModal() {
            productModal.classList.remove('open');
            productModal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.view-product').forEach((button) => {
            button.addEventListener('click', function() {
                openProductModal(this.dataset.name, this.dataset.front, this.dataset.back);
            });
        });

        modalViewButtons.forEach((button) => {
            button.addEventListener('click', function() {
                setModalView(this.dataset.view);
            });
        });

        document.querySelectorAll('[data-close-modal]').forEach((button) => {
            button.addEventListener('click', closeProductModal);
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && productModal.classList.contains('open')) {
                closeProductModal();
            }
        });

        // Initialize cart count on page load
        updateCartCount();

        // Size selector functionality for each product card
        document.querySelectorAll('.product-card').forEach(card => {
            let selectedSize = null;
            const sizeOptions = card.querySelectorAll('.size-option');

            sizeOptions.forEach(option => {
                option.addEventListener('click', function() {
                    sizeOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedSize = this.dataset.size;
                });
            });

            // Add to cart functionality
            const addToCartBtn = card.querySelector('.add-to-cart');
            addToCartBtn.addEventListener('click', function() {
                if (!selectedSize) {
                    alert('Please select a size');
                    return;
                }

                const productName = this.dataset.product;
                const productPrice = parseFloat(this.dataset.price);

                let cart = getCart();

                const existingItemIndex = cart.findIndex(
                    item => item.name === productName && item.size === selectedSize
                );

                if (existingItemIndex > -1) {
                    cart[existingItemIndex].quantity += 1;
                } else {
                    cart.push({
                        name: productName,
                        price: productPrice,
                        size: selectedSize,
                        quantity: 1
                    });
                }

                saveCart(cart);

                const originalText = this.textContent;
                this.textContent = 'ADDED!';
                setTimeout(() => {
                    this.textContent = originalText;
                }, 1000);

                sizeOptions.forEach(opt => opt.classList.remove('selected'));
                selectedSize = null;
            });
        });
    </script>
</body>
</html>
