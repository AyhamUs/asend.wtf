<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #030303;
            --surface: #0b0b0b;
            --text: #f3f3f3;
            --muted: #979797;
            --line: #1f1f1f;
            --line-strong: #2f2f2f;
            --button: #121212;
            --button-hover: #f3f3f3;
            --button-hover-text: #090909;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(1100px circle at 14% -12%, #171717 0%, rgba(23, 23, 23, 0) 44%),
                radial-gradient(900px circle at 110% 120%, #101010 0%, rgba(16, 16, 16, 0) 45%),
                var(--bg);
            padding: 2rem 1rem;
            position: relative;
            color: var(--text);
            overflow-x: hidden;
            color-scheme: dark;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            filter: blur(72px);
            pointer-events: none;
            z-index: -1;
            opacity: 0.42;
        }

        body::before {
            background: #1a1a1a;
            top: -120px;
            left: -120px;
        }

        body::after {
            background: #111111;
            right: -130px;
            bottom: -130px;
        }

        .cart-icon {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 1.5rem;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .cart-icon:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--text);
            color: #0d131d;
            font-size: 0.625rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .container {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: min(100%, 760px);
            background: linear-gradient(180deg, rgba(16, 16, 16, 0.9), rgba(8, 8, 8, 0.88));
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: clamp(1.5rem, 3vw, 3rem);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            animation: riseIn 0.7s ease-out;
        }

        .eyebrow {
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            color: var(--muted);
            margin-bottom: 1.1rem;
            font-weight: 500;
        }

        footer {
            padding: 2.5rem;
            font-size: 0.6875rem;
            color: var(--muted);
            letter-spacing: 0.25em;
            font-weight: 400;
        }

        .logo {
            margin-bottom: clamp(2rem, 4vw, 3.25rem);
            overflow: hidden;
            display: inline-block;
        }

        .logo img {
            max-width: min(560px, 78vw);
            height: auto;
            display: block;
            margin-bottom: -10px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            align-items: center;
            width: min(100%, 420px);
        }

        .btn {
            padding: 0.95rem 1.25rem;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            border: 1px solid var(--line-strong);
            background: var(--button);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            transition: all 0.2s ease;
            width: 100%;
            border-radius: 999px;
            animation: riseIn 0.55s ease both;
        }

        .btn i {
            margin-right: 0;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .btn:hover {
            background: var(--button-hover);
            border-color: var(--button-hover);
            color: var(--button-hover-text);
            transform: translateY(-1px);
        }

        .buttons .btn:first-child {
            background: var(--text);
            color: #090909;
            border-color: var(--text);
        }

        .buttons .btn:first-child:hover {
            opacity: 0.92;
        }

        .buttons .btn:nth-child(1) { animation-delay: 0.12s; }
        .buttons .btn:nth-child(2) { animation-delay: 0.2s; }
        .buttons .btn:nth-child(3) { animation-delay: 0.28s; }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .container,
            .btn {
                animation: none;
            }
        }

        @media (max-width: 768px) {
            .cart-icon {
                top: 1.5rem;
                right: 1.5rem;
                font-size: 1.25rem;
            }

            .logo {
                margin-bottom: 2.5rem;
            }

            .btn {
                padding: 0.85rem 1rem;
                font-size: 0.75rem;
            }

            footer {
                padding: 1rem;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .cart-icon {
                top: 1rem;
                right: 1rem;
                font-size: 1.125rem;
            }

            .logo {
                margin-bottom: 2rem;
            }

            .btn {
                padding: 0.75rem 0.95rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <a href="cart.html" class="cart-icon">
        <i class="fa-solid fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </a>

    <div class="container">
        <p class="eyebrow" id="dropStamp"></p>
        <h1 class="logo">
            <img src="assets/logo.png" alt="Asend Logo">
        </h1>
        
        <div class="buttons">
            <a href="shop.html" class="btn"><i class="fa-solid fa-bag-shopping"></i>SHOP</a>
            <a href="mailto:asendshop@gmail.com" class="btn"><i class="fa-solid fa-envelope"></i>CONTACT</a>
            <a href="https://instagram.com/asendrc" target="_blank" rel="noopener noreferrer" class="btn"><i class="fa-brands fa-instagram"></i>INSTAGRAM</a>
        </div>
    </div>

    <footer>
        ASEND © 2026
    </footer>

    <script>
        function updateDropStamp() {
            const stamp = document.getElementById('dropStamp');
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = now.toLocaleString('en-US', { month: 'short' }).toUpperCase();
            const year = now.getFullYear();
            stamp.textContent = `${day} ${month} ${year}`;
        }

        function getCart() {
            return JSON.parse(localStorage.getItem('asendCart') || '[]');
        }

        function updateCartCount() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        // Initialize page meta
        updateDropStamp();
        updateCartCount();
    </script>
</body>
</html>
