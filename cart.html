<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Asend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #030303;
            --surface: #0b0b0b;
            --text: #f3f3f3;
            --muted: #979797;
            --line: #1f1f1f;
            --line-strong: #2f2f2f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(1100px circle at 14% -12%, #171717 0%, rgba(23, 23, 23, 0) 44%),
                radial-gradient(900px circle at 110% 120%, #101010 0%, rgba(16, 16, 16, 0) 45%),
                var(--bg);
            padding: 2rem 1rem;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
            color-scheme: dark;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: -1;
            opacity: 0.45;
        }

        body::before {
            background: #1a1a1a;
            top: -110px;
            left: -120px;
        }

        body::after {
            background: #111111;
            right: -120px;
            bottom: -130px;
        }

        .header {
            margin-bottom: 4rem;
        }

        .header-row {
            width: min(980px, 100%);
            margin: 0 auto 0.9rem;
            min-height: 92px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(16, 16, 16, 0.9), rgba(8, 8, 8, 0.88));
            border: 1px solid var(--line);
            border-radius: 18px;
            backdrop-filter: blur(6px);
        }

        .logo {
            margin-bottom: 0;
            overflow: hidden;
            display: inline-block;
        }

        .logo img {
            max-width: min(420px, 72vw);
            height: auto;
            display: block;
            margin-bottom: -10px;
        }

        .back-link {
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.2em;
            transition: color 0.2s;
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .back-link:hover {
            color: var(--text);
        }

        .back-link i {
            margin-right: 0.5rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .cart-title {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            text-align: center;
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            font-size: 0.875rem;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
        }

        .cart-empty i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .cart-empty .continue-shopping {
            margin-top: 1rem;
            display: inline-block;
        }

        .cart-items {
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
        }

        .cart-item {
            padding: 1.5rem;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .item-info {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .item-price {
            font-size: 1rem;
            font-weight: 400;
            margin-right: 1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-right: 1rem;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--line-strong);
            background: #121212;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            border-radius: 999px;
        }

        .qty-btn:hover {
            background: var(--text);
            border-color: var(--text);
            color: #090909;
        }

        .qty-display {
            min-width: 30px;
            text-align: center;
            font-size: 0.875rem;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.125rem;
            transition: color 0.2s;
        }

        .remove-btn:hover {
            color: var(--text);
        }

        .cart-summary {
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
        }

        .summary-row.total {
            font-size: 1.125rem;
            font-weight: 500;
            padding-top: 1rem;
            border-top: 1px solid var(--line);
            margin-bottom: 0;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.125rem;
            margin-top: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8125rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            border: 1px solid var(--text);
            background: var(--text);
            color: #090909;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 999px;
        }

        .checkout-btn:hover {
            opacity: 0.92;
        }

        .checkout-btn:active {
            transform: scale(0.98);
        }

        .continue-shopping {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.2em;
            transition: color 0.2s;
        }

        .continue-shopping:hover {
            color: var(--text);
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            margin-top: 4rem;
            font-size: 0.6875rem;
            color: var(--muted);
            letter-spacing: 0.25em;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            .header-row {
                min-height: 84px;
            }

            .container {
                padding: 0 1rem;
            }

            .cart-item {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .item-details {
                flex-basis: 100%;
            }

            .quantity-controls {
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <h1 class="logo">
                <img src="assets/logo.png" alt="Asend Logo">
            </h1>
        </div>
        <a href="shop.html" class="back-link"><i class="fa-solid fa-arrow-left"></i>BACK TO SHOP</a>
    </div>

    <div class="container">
        <h2 class="cart-title">YOUR CART</h2>

        <div id="cartContent"></div>
    </div>

    <footer>
        ASEND © 2026
    </footer>

    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('asendCart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('asendCart', JSON.stringify(cart));
            renderCart();
        }

        function updateQuantity(index, change) {
            let cart = getCart();
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            saveCart(cart);
        }

        function removeItem(index) {
            let cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
        }

        function calculateTotal(cart) {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function renderCart() {
            const cart = getCart();
            const cartContent = document.getElementById('cartContent');

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="cart-empty">
                        <i class="fa-solid fa-shopping-cart"></i>
                        <p>YOUR CART IS EMPTY</p>
                        <a href="shop.html" class="continue-shopping">CONTINUE SHOPPING</a>
                    </div>
                `;
                return;
            }

            const itemsHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-info">SIZE: ${item.size}</div>
                    </div>
                    <div class="quantity-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                    <div class="item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${index})" title="Remove item">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            `).join('');

            const total = calculateTotal(cart);
            const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            cartContent.innerHTML = `
                <div class="cart-items">
                    ${itemsHTML}
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>ITEMS (${itemCount})</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>TOTAL</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">CHECKOUT</button>
                </div>
                <a href="shop.html" class="continue-shopping">CONTINUE SHOPPING</a>
            `;
        }

        function checkout() {
            alert('Checkout functionality coming soon!');
        }

        // Initialize cart display
        renderCart();
    </script>
</body>
</html>
